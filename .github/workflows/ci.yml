name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Astro typecheck
        run: npx astro check

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          PUBLIC_GTM_ID: GTM-TEST
          PUBLIC_GA4_ID: G-TEST
          PUBLIC_CF_ANALYTICS_TOKEN: test-token
          PUBLIC_SITE_URL: https://www.kloopik.com
